<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bills</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

.bill{
padding:15px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
}

button{
background:#c4a484;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Household Bills</h2>

<div id="billsList"></div>

<h3>Add Bill</h3>

<input id="title" placeholder="Bill title"><br><br>
<input id="amount" placeholder="Amount"><br><br>
<input id="dueDate" type="date"><br><br>

<button onclick="addBill()">Add Bill</button>

</div>

<script src="js/bills.js"></script>

</body>
</html>
